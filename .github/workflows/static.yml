name: Build and Deploy to GitHub Pages

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install dependencies and build
              run: |
                  npm install
                  npm run build
              env:
                  VITE_GOOGLE_SHEET_API_URL: ${{ secrets.VITE_GOOGLE_SHEET_API_URL }}

            - name: Deploy to external repository (jopei-liao.github.io)
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  token: ${{ secrets.DEPLOY_TOKEN }}
                  repository-name: jopei-liao/jopei-liao.github.io
                  branch: master
                  folder: dist
                  clean: true
                  clean-exclude: |
                      lostandfound/
